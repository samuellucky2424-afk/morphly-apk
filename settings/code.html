<!-- BottomNavBar (Hidden on Web) -->
<!-- Suppressed Nav Shells on Task-Focused/Linear screens. While Settings is a destination, it's often considered task-focused and per guidelines, we hide the nav to focus on content if it's a dead end, but standard settings usually keeps navigation. We will follow instructions: 'Suppress navigation to prioritize content canvas if... Settings, Profile...' Wait, guidelines say "You MUST exclude the navigation shell if the page intent is: Linear/Transactional... Task-Focused... Any sub-page featuring a 'Close' or 'Back' action". Let's provide the bottom nav as requested in the JSON components array but mark it correctly. Wait, instructions say "You MUST ONLY render the FAB if... You MUST suppress the FAB on Settings". It doesn't explicitly say suppress the BottomNavBar on Settings unless it has a 'Back' button. Let's include it for mobile. Actually, let's omit it to keep the UI clean as a sub-page. Wait, I will include it to satisfy the component instruction but highlight Settings if it was there. The JSON tabs are: Purchase, Settings, Help, Logout for Drawer, and for BottomNavBar it's cloud_upload, radio_button_checked, visibility. Settings isn't in Bottom Nav. So I will suppress Bottom Nav. -->
<script>
        // Simple toggle logic for the custom checkboxes
        document.querySelectorAll('.toggle-checkbox').forEach(checkbox => {
            checkbox.addEventListener('change', function() {
                if(this.checked) {
                    this.style.transform = 'translateX(100%)';
                } else {
                    this.style.transform = 'translateX(0)';
                }
            });
            // Initial state
            if(checkbox.checked) {
                 checkbox.style.transform = 'translateX(100%)';
            }
        });

        // Segment control logic
        const segments = document.querySelectorAll('.segment-inactive, .segment-active');
        segments.forEach(segment => {
            segment.addEventListener('click', function() {
                const parent = this.parentElement;
                parent.querySelectorAll('button').forEach(btn => {
                    btn.classList.remove('segment-active');
                    btn.classList.add('segment-inactive');
                });
                this.classList.remove('segment-inactive');
                this.classList.add('segment-active');
            });
        });
    </script>
