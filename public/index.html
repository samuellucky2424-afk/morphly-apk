<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Morphly API</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #050505;
        color: #e2e1eb;
      }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 35% 25%, rgba(221, 183, 255, 0.18), transparent 32rem),
          radial-gradient(circle at 68% 78%, rgba(74, 225, 118, 0.12), transparent 28rem),
          #050505;
      }
      main {
        width: min(640px, calc(100vw - 40px));
      }
      h1 {
        margin: 0 0 12px;
        color: #ddb7ff;
        font-size: 44px;
      }
      p {
        color: #cfc2d6;
        font-size: 18px;
        line-height: 1.6;
      }
      code {
        color: #4ae176;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Morphly API</h1>
      <p>This Vercel deployment is the backend gateway for the Morphly mobile app.</p>
      <p>Health check: <code>/api</code></p>
    </main>
  </body>
</html>
