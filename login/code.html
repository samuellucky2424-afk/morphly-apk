<!DOCTYPE html>

                      "on-primary-container": "#400071",
                      "on-secondary-fixed-variant": "#005321",
                      "secondary": "#4ae176",
                      "tertiary": "#ffb3ad",
                      "on-surface-variant": "#cfc2d6",
                      "background": "#050505",
                      "primary-fixed-dim": "#ddb7ff",
                      "primary": "#ddb7ff",
                      "border": "#27272A",
                      "on-primary-fixed": "#2c0051",
                      "secondary-fixed-dim": "#4ae176",

<style>
    body {
      min-height: max(884px, 100dvh);

<body class="bg-background text-on-background font-body-lg min-h-screen flex flex-col justify-center items-center p-margin-mobile mesh-bg">
<main class="w-full max-w-md bg-card-bg border border-border rounded-xl p-stack-lg shadow-2xl relative overflow-hidden">
<!-- Subtle inner glow for depth -->
<div class="absolute inset-0 rounded-xl shadow-[inset_0_0_20px_rgba(255,255,255,0.02)] pointer-events-none"></div>
<div class="text-center mb-stack-lg relative z-10">
<h1 class="font-app-title text-app-title text-primary tracking-tight mb-stack-sm drop-shadow-[0_0_10px_rgba(221,183,255,0.3)]">Morphly</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Welcome back</p>
</div>
<form class="flex flex-col gap-stack-md relative z-10">
<div class="flex flex-col gap-base">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-2" for="email">Email Address</label>
<div class="relative glow-input transition-all duration-300 rounded-full border border-border bg-surface overflow-hidden">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant" data-icon="mail">mail</span>
<input class="w-full bg-transparent border-none text-on-background font-body-lg py-3 pl-12 pr-4 focus:ring-0 placeholder-outline-variant/50" id="email" placeholder="you@example.com" type="email"/>
</div>
</div>
<div class="flex flex-col gap-base">
<div class="flex justify-between items-center ml-2 mr-2">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="password">Password</label>
<a class="font-label-caps text-label-caps text-primary hover:text-primary-fixed-dim transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative glow-input transition-all duration-300 rounded-full border border-border bg-surface overflow-hidden">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant" data-icon="lock">lock</span>
<input class="w-full bg-transparent border-none text-on-background font-body-lg py-3 pl-12 pr-12 focus:ring-0 placeholder-outline-variant/50" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant hover:text-on-surface transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<button class="mt-stack-sm w-full bg-primary-container text-on-primary-container font-button-lg text-button-lg py-4 rounded-full shadow-[0_0_20px_rgba(183,109,255,0.2)] hover:shadow-[0_0_25px_rgba(183,109,255,0.4)] hover:scale-[0.98] transition-all duration-200" type="submit">
                Login
            </button>
</form>
<div class="mt-stack-lg text-center relative z-10">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                Don't have an account? 
                <a class="text-primary font-button-sm hover:text-primary-fixed-dim transition-colors ml-1" href="#">Create account</a>
</p>
</div>
</main>
</body></html>
