name: decart_realtime_bridge
description: Flutter platform bridge for Morphly realtime Decart sessions.
version: 0.1.0
publish_to: "none"

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.morphly.decart_realtime_bridge
        pluginClass: DecartRealtimeBridgePlugin
      ios:
        pluginClass: DecartRealtimeBridgePlugin
