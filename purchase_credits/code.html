        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

            font-variation-settings: 'FILL' 1;
        }

            box-shadow: 0 0 15px rgba(34, 197, 94, 0.4);
        }
        .glow-effect:hover {
            box-shadow: 0 0 25px rgba(34, 197, 94, 0.6);

    body {
      min-height: max(884px, 100dvh);

<body class="bg-background text-on-background min-h-screen font-body-sm flex flex-col relative pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 right-0 m-stack-md rounded-xl overflow-hidden bg-surface/70 backdrop-blur-[20px] shadow-[0_0_15px_rgba(221,183,255,0.1)] border border-white/10 z-50 flex justify-between items-center px-stack-md h-14 w-[calc(100%-32px)] mx-auto">
<button class="text-primary hover:bg-surface-variant/50 transition-colors p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<div class="font-app-title text-app-title text-primary tracking-tight">Morphly</div>
<button class="text-primary hover:bg-surface-variant/50 transition-colors px-3 py-1.5 rounded-full flex items-center gap-1 bg-surface-container-high/50 border border-primary/20">
<span class="font-label-caps text-label-caps">120</span>
<span class="material-symbols-outlined text-sm icon-fill" style="font-variation-settings: 'FILL' 1;">bolt</span>
</button>
</header>
<!-- Main Content -->
<main class="flex-1 mt-28 px-margin-mobile w-full max-w-md mx-auto flex flex-col gap-stack-lg">
<!-- Header Section -->
<div class="flex flex-col gap-2">
<h1 class="font-page-title text-page-title text-white">Purchase Credits</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Choose a package</p>
</div>
<!-- Packages List -->
<div class="flex flex-col gap-stack-sm">
<!-- Package 1 -->
<div class="bg-card-bg border border-border rounded-xl p-stack-md flex items-center justify-between relative overflow-hidden group hover:border-primary/50 transition-colors">
<div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
<div class="flex flex-col gap-1 relative z-10">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-xl icon-fill" style="font-variation-settings: 'FILL' 1;">bolt</span>
<span class="font-headline-md text-headline-md text-white">50 Credits</span>
</div>
<span class="font-body-sm text-body-sm text-on-surface-variant pl-7">₦1,000</span>
</div>
<button class="relative z-10 border-[1.5px] border-primary text-white px-4 py-2 rounded-full font-button-sm text-button-sm hover:bg-primary/10 transition-colors">
                    Buy
                </button>
</div>
<!-- Package 2 (Popular/Highlighted) -->
<div class="bg-card-bg border-[1.5px] border-primary rounded-xl p-stack-md flex items-center justify-between relative overflow-hidden group shadow-[0_0_15px_rgba(221,183,255,0.1)]">
<!-- Mesh Gradient Background -->
<div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-primary/20 via-card-bg to-card-bg opacity-30"></div>
<div class="absolute top-0 right-0 bg-primary text-on-primary font-label-caps text-label-caps px-2 py-0.5 rounded-bl-lg rounded-tr-xl">POPULAR</div>
<div class="flex flex-col gap-1 relative z-10 mt-2">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-xl icon-fill" style="font-variation-settings: 'FILL' 1;">bolt</span>
<span class="font-headline-md text-headline-md text-white">120 Credits</span>
</div>
<span class="font-body-sm text-body-sm text-on-surface-variant pl-7">₦2,000</span>
</div>
<button class="relative z-10 bg-secondary text-on-secondary px-5 py-2 rounded-full font-button-sm text-button-sm glow-effect transition-all transform active:scale-95 mt-2">
                    Buy
                </button>
</div>
<!-- Package 3 -->
<div class="bg-card-bg border border-border rounded-xl p-stack-md flex items-center justify-between relative overflow-hidden group hover:border-primary/50 transition-colors">
<div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
<div class="flex flex-col gap-1 relative z-10">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-xl icon-fill" style="font-variation-settings: 'FILL' 1;">bolt</span>
<span class="font-headline-md text-headline-md text-white">350 Credits</span>
</div>
<span class="font-body-sm text-body-sm text-on-surface-variant pl-7">₦5,000</span>
</div>
<button class="relative z-10 border-[1.5px] border-primary text-white px-4 py-2 rounded-full font-button-sm text-button-sm hover:bg-primary/10 transition-colors">
                    Buy
                </button>
</div>
<!-- Package 4 -->
<div class="bg-card-bg border border-border rounded-xl p-stack-md flex items-center justify-between relative overflow-hidden group hover:border-primary/50 transition-colors">
<div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
<div class="flex flex-col gap-1 relative z-10">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-xl icon-fill" style="font-variation-settings: 'FILL' 1;">bolt</span>
<span class="font-headline-md text-headline-md text-white">800 Credits</span>
</div>
<span class="font-body-sm text-body-sm text-on-surface-variant pl-7">₦10,000</span>
</div>
<button class="relative z-10 border-[1.5px] border-primary text-white px-4 py-2 rounded-full font-button-sm text-button-sm hover:bg-primary/10 transition-colors">
                    Buy
                </button>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full pb-stack-lg z-50 bg-gradient-to-t from-black/80 to-transparent flex justify-around items-center px-margin-mobile md:hidden">

<span class="material-symbols-outlined" data-icon="cloud_upload">cloud_upload</span>
</button>

<span class="material-symbols-outlined text-3xl icon-fill" data-icon="radio_button_checked" style="font-variation-settings: 'FILL' 1;">radio_button_checked</span>
</button>
<button class="flex items-center justify-center text-white/70 bg-surface-container/80 backdrop-blur-md rounded-full w-14 h-14 hover:scale-105 transition-transform">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</nav>
